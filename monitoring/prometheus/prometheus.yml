global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'mysql'
    static_configs:
      - targets: ['mysqld-exporter:9104']  # 使用服务名 + 端口

  - job_name: 'spring-boot-app'
    metrics_path: '/actuator/prometheus' # Spring Boot 暴露的路径
    static_configs:
      # 【关键】Windows/Mac 使用 host.docker.internal 访问宿主机
      - targets: ['host.docker.internal:12345'] 
        labels:
          group: 'local-dev'

  - job_name: 'elasticsearch'
    static_configs:
      # 使用 docker 内部服务名访问，端口对应 exporter 的暴露端口
      - targets: ['elasticsearch-exporter:9114']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'canal'
    scrape_interval: 15s
    static_configs:
      - targets: ['canal-server:11112']
